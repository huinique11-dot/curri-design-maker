<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국수업자랑 앱 메이커 (App Factory)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="p-4 sm:p-8 flex justify-center">

    <div class="w-full max-w-3xl bg-white p-6 sm:p-10 rounded-2xl shadow-xl">
        <div class="text-center mb-8 border-b-4 border-indigo-500 pb-4">
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">🏭 전국수업자랑 앱 메이커</h1>
            <p class="text-slate-600">선생님만의 교과 맞춤형 '수업 디자인 도우미' 앱을 1분 만에 만들어 드립니다!</p>
        </div>

        <div class="space-y-6">
            <div>
                <label class="block font-bold text-slate-700 mb-2">1. 선생님의 교과명은 무엇인가요?</label>
                <input type="text" id="m-subject" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="예: 과학, 국어, 체육">
            </div>

            <div>
                <label class="block font-bold text-slate-700 mb-2">2. 교과의 '내용 체계 영역'을 적어주세요. (쉼표로 구분)</label>
                <input type="text" id="m-domain" class="w-full p-3 border border-gray-300 rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="예: 운동과 에너지, 물질, 생명, 지구와 우주">
            </div>

            <div>
                <label class="block font-bold text-slate-700 mb-2">3. 2022 개정 성취기준 복사+붙여넣기 (엔터키로 줄바꿈하여 구분)</label>
                <p class="text-sm text-slate-500 mb-2">※ 교육과정 PDF나 HWP 파일에서 긁어와서 그대로 붙여넣으세요.</p>
                
                <div class="space-y-4">
                    <div>
                        <span class="text-sm font-bold text-indigo-600">초등학교 3~4학년</span>
                        <textarea id="m-std-e34" rows="3" class="w-full p-2 border border-gray-300 rounded text-sm" placeholder="[4과01-01] 자석의 성질을 조사한다... (엔터)"></textarea>
                    </div>
                    <div>
                        <span class="text-sm font-bold text-indigo-600">초등학교 5~6학년</span>
                        <textarea id="m-std-e56" rows="3" class="w-full p-2 border border-gray-300 rounded text-sm"></textarea>
                    </div>
                    <div>
                        <span class="text-sm font-bold text-indigo-600">중학교 1~3학년</span>
                        <textarea id="m-std-m13" rows="3" class="w-full p-2 border border-gray-300 rounded text-sm"></textarea>
                    </div>
                    <div>
                        <span class="text-sm font-bold text-indigo-600">고등학교</span>
                        <textarea id="m-std-h" rows="3" class="w-full p-2 border border-gray-300 rounded text-sm"></textarea>
                    </div>
                </div>
            </div>

            <div class="pt-6">
                <button onclick="generateApp()" class="w-full bg-indigo-600 text-white font-extrabold py-4 px-4 rounded-xl shadow-lg hover:bg-indigo-700 transition text-lg">
                    🚀 내 교과 전용 앱 만들기 (HTML 파일 다운로드)
                </button>
            </div>
            <div class="text-center text-xs text-slate-400 mt-4">&copy; 휘니크프로젝트 - 선생님들을 위한 바이브 코딩</div>
        </div>
    </div>

    <textarea id="template-html" style="display:none;">
</textarea>

    <script>
        function generateApp() {
            // 1. 입력된 데이터 가져오기
            const subject = document.getElementById('m-subject').value || "새로운 과목";
            
            // 쉼표로 구분된 영역을 배열로 만듭니다.
            const domainsRaw = document.getElementById('m-domain').value;
            const domains = domainsRaw ? domainsRaw.split(',').map(d => d.trim()) : ["영역1", "영역2"];

            // 엔터(줄바꿈)로 구분된 성취기준을 배열로 만듭니다.
            const getLines = (id) => document.getElementById(id).value.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            
            // 2. 새로운 curriculumData 덩어리 만들기
            const newData = {
                subject: subject,
                domains: domains,
                lenses: [
                    "관계 (Relationship)", "정체성 (Identity)", "상호작용 (Interaction)", "변형 (Change)", 
                    "표현 (Expression)", "소통 (Communication)", "형식 (Form)", "기능 (Function)", 
                    "관점 (Perspective)", "미학 (Aesthetics)", "구조 (Structure)", "패턴 (Pattern)", 
                    "균형 (Balance)", "혁신 (Innovation)"
                ],
                contexts: [
                    "정체성과 관계", "공간과 시간에서의 방향", "개인적/문화적 표현",
                    "과학적/기술적 혁신", "세계화와 지속가능성", "공정성과 발달"
                ],
                sdgs: [
                    "1. 빈곤 종식", "2. 기아 해소", "3. 건강과 웰빙", "4. 양질의 교육", "5. 성평등", 
                    "6. 깨끗한 물과 위생", "7. 적정가격의 깨끗한 에너지", "8. 좋은 일자리와 경제성장", 
                    "9. 산업, 혁신 및 인프라", "10. 불평등 감소", "11. 지속가능한 도시와 지역사회", 
                    "12. 책임있는 소비와 생산", "13. 기후 행동", "14. 해양 생태계 보전", 
                    "15. 육상 생태계 보전", "16. 평화, 정의, 강력한 제도", "17. 글로벌 파트너십"
                ],
                standards: {
                    "초3-4": getLines('m-std-e34').length > 0 ? getLines('m-std-e34') : ["등록된 성취기준이 없습니다."],
                    "초5-6": getLines('m-std-e56').length > 0 ? getLines('m-std-e56') : ["등록된 성취기준이 없습니다."],
                    "중1-3": getLines('m-std-m13').length > 0 ? getLines('m-std-m13') : ["등록된 성취기준이 없습니다."],
                    "고등": getLines('m-std-h').length > 0 ? getLines('m-std-h') : ["등록된 성취기준이 없습니다."]
                }
            };

            // 3. 숨겨둔 템플릿 코드 꺼내기
            let template = document.getElementById('template-html').value;
            
            // 템플릿이 비어있으면 경고
            if(template.trim() === "" || template.trim() === "") {
                alert("앗! 소스 코드 안에 원본 앱(index.html) 템플릿이 들어있지 않습니다. 개발자에게 문의하세요.");
                return;
            }

            // 4. 기존 앱 코드에서 curriculumData 부분만 방금 만든 새 데이터로 싹 갈아끼우기!
            // 정규식을 사용해 기존 데이터를 찾아냅니다.
            const regex = /const curriculumData\s*=\s*\{[\s\S]*?\};\s*(?=\/\/ \★)/;
            const replacement = `const curriculumData = ${JSON.stringify(newData, null, 4)};\n\n        // ★`;
            
            let finalHtml = template.replace(regex, replacement);

            // 5. 완성된 HTML을 파일로 굽고 다운로드 시키기 (마법의 순간!)
            const blob = new Blob([finalHtml], { type: "text/html;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `전국${subject}수업자랑_앱.html`;
            link.click();
        }
    </script>
</body>
</html>
